---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Chart.Name | quote }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name | quote }}
    spec:
      containers:
        - name: {{ .Chart.Name | quote }}
          image: "{{ default .Values.global.image.repository .Values.image.repository }}/{{ default .Chart.Name .Values.image.name }}:{{ default .Values.global.image.tag .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ACCEPT_EULA
              value: {{ .Values.env.acceptEula | quote }}
            - name: MSSQL_SA_PASSWORD
              value: {{ .Values.env.saPassword | quote }}
            - name: MSSQL_PID
              value: {{ .Values.env.pid | quote }}
          ports:
            - name: {{ .Values.ports.name }}
              containerPort: {{ .Values.ports.containerPort }}
              protocol: {{ .Values.ports.protocol }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          securityContext:
            capabilities:
                add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: mssql-data
              mountPath: {{ .Values.persistence.mountPath }}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
      volumes:
        - name: mssql-data
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-pvc
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
