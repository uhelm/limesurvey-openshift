---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}-allow-from-nginx
  labels: {{ include "php.labels.standard" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name | quote }}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: limesurvey-nginx
  policyTypes:
    - Ingress
