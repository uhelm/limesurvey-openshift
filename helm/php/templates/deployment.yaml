---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Chart.Name | quote }}
  namespace: {{ .Values.global.licensePlate }}{{ .Values.global.sectionTag }}
  labels:
{{ include "php.labels.standard" . | indent 4 }}
    app.openshift.io/runtime: {{ .Values.labels.runtime }}
    app.openshift.io/runtime-version: {{ .Values.labels.version | quote }}
spec:
  replicas: {{ .Values.global.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name | quote }}
  template:
    metadata:
      labels: 
        app.kubernetes.io/name: {{ .Chart.Name | quote }}
      annotations:
        {{- if .Values.global.vault.enabled }}
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-init-first: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/namespace: {{ .Values.global.vault.namespace }}
        vault.hashicorp.com/role: {{ .Values.global.vault.engine }}
        vault.hashicorp.com/auth-path: {{ .Values.global.vault.authPath }}
        vault.hashicorp.com/agent-inject-secret-mssql: {{ .Values.global.vault.engine }}{{ .Values.global.vault.path }}/mssql
        vault.hashicorp.com/agent-inject-template-mssql: |
          {{ `{{- with secret ` }}"{{ .Values.global.vault.engine }}{{ .Values.global.vault.path }}/mssql"{{ ` }}
          {{- range $k, $v := .Data.data }}
          export {{ $k }}='{{ $v }}'
          {{- end }}
          {{- end }}` }}
        {{- end }}
    spec:
      volumes:
        - name: {{ .Values.volumeMounts.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.volumeMounts.name }}
        - name: tmp
          emptyDir: {}
      {{- if .Values.global.vault.serviceAccount }}
      serviceAccountName: {{ .Values.global.vault.serviceAccount }}
      {{- end }}
      initContainers:
        - name: limesurvey-init
          image: "{{ default .Values.global.image.repository .Values.image.repository }}/{{ default .Chart.Name .Values.image.name }}:{{ default .Values.global.image.tag .Values.image.tag }}"
          command: ["/bin/bash", "limesurvey-init.sh"]
          volumeMounts:
            - mountPath: {{ .Values.volumeMounts.mountPath | quote }}
              name: {{ .Values.volumeMounts.name }}
              {{- if .Values.volumeMounts.subPath }}
              subPath: {{ .Values.volumeMounts.subPath | quote }}
              {{- end }}
            - mountPath: /tmp
              name: tmp
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          imagePullPolicy: Always
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          securityContext: {}      
      containers:
        - name: {{ .Chart.Name | quote }}
          image: "{{ default .Values.global.image.repository .Values.image.repository }}/{{ default .Chart.Name .Values.image.name }}:{{ default .Values.global.image.tag .Values.image.tag }}"
          ports:
            - name: {{ .Values.ports.name }}
              containerPort: {{ .Values.ports.containerPort }}
              protocol: {{ .Values.ports.protocol }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
          command: ["/bin/bash"]
          args: [ "-c", "source /vault/secrets/mssql && php-fpm"]
          volumeMounts:
            - mountPath: {{ .Values.volumeMounts.mountPath | quote }}
              name: {{ .Values.volumeMounts.name }}
              {{- if .Values.volumeMounts.subPath }}
              subPath: {{ .Values.volumeMounts.subPath | quote }}
              {{- end }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.ports.containerPort }}
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe: 
            tcpSocket:
              port: {{ .Values.ports.containerPort }}
            initialDelaySeconds: 120
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
...
