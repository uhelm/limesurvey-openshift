---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name | quote }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name | quote }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ .Chart.Name | quote }}
  ports:
    - name: {{ .Values.ports.name }}
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.ports.containerPort }}
      protocol: {{ .Values.ports.protocol }}
