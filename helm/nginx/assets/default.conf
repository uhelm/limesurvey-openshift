client_body_temp_path /tmp/client_temp;
proxy_temp_path       /tmp/proxy_temp;
fastcgi_temp_path     /tmp/fastcgi_temp;
uwsgi_temp_path       /tmp/uwsgi_temp;
scgi_temp_path        /tmp/scgi_temp;
proxy_cache_path      /tmp/cache/nginx keys_zone=cache:50m;
proxy_cache cache;
proxy_cache_key "$scheme$request_method$host$uri$is_args$args";

gzip on;
gzip_vary on; 
gzip_min_length 1024; 
gzip_proxied any; 

# Trust OpenShift Router IP range
set_real_ip_from 10.0.0.0/8; 
real_ip_header X-Forwarded-For;

server {
    listen 8080 default_server;
    server_name default_server;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(self), fullscreen=*";
    add_header X-Content-Type-Options "nosniff";
    add_header X-Robots-Tag "noindex";

    location / {
        root /var/www/html/limesurvey;
        index index.php index.html index.htm;
    }

    # Redirect server error pages to the static page /50x.html
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html/;
    }
    
    # Pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    location /nginx_status {
        stub_status on;
        access_log off;
        log_not_found off;
        allow 127.0.0.1;
        deny all;
    }

    location ~ \.(php)$ {
        root            /var/www/html/limesurvey;
        fastcgi_pass    limesurvey-php:9000;
        fastcgi_index   /limesurvey/index.php;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param   QUERY_STRING  $query_string;
        include         /etc/nginx/fastcgi_params;

        fastcgi_cache_background_update on;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_age 10s;
        fastcgi_cache_lock_timeout 10s;
        fastcgi_cache_revalidate on;
        fastcgi_cache_use_stale error timeout updating http_500 http_503;
        fastcgi_cache_valid 200 30s;
        fastcgi_cache_valid 404 1s;
        add_header X-Proxy-Cache $upstream_cache_status;
    }

    location ^~ /healthz {
        access_log off;
        add_header 'Content-Type' 'text/plain';
        allow 127.0.0.1;
        deny all;
        return 200 "healthy\n";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /var/www/html/limesurvey;
        expires 30d;
#        access_log off;
        gzip_static on;
        add_header Cache-Control "public, no-transform";
    }
}
