client_body_temp_path /tmp/client_temp;
proxy_temp_path       /tmp/proxy_temp;
fastcgi_temp_path     /tmp/fastcgi_temp;
uwsgi_temp_path       /tmp/uwsgi_temp;
scgi_temp_path        /tmp/scgi_temp;

gzip on;
gzip_vary on; 
gzip_min_length 1024; 
gzip_proxied any; 

# Trust OpenShift Router IP range
set_real_ip_from 10.0.0.0/8; 
real_ip_header X-Forwarded-For;

server {
    listen 8080 default_server;
    server_name default_server;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(self), fullscreen=*";
    add_header X-Content-Type-Options "nosniff";
    add_header X-Robots-Tag "noindex";

    location / {
        root /var/www/html/limesurvey;
        index index.php index.html index.htm;
    }

    # Redirect server error pages to the static page /50x.html
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html/;
    }
    
    # Pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    location /nginx_status {
        stub_status on;
        access_log off;
        log_not_found off;
        allow 127.0.0.1;
        deny all;
    }

    location ~ \.(php)$ {
        try_files $fastcgi_script_name =404;
        root /var/www/html/limesurvey;
        
        fastcgi_pass    limesurvey-php:9000;
        fastcgi_index   /limesurvey/index.php;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param   QUERY_STRING  $query_string;
        include         /etc/nginx/fastcgi_params;

        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;

        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 64k;

        add_header X-Proxy-Cache $upstream_cache_status;
    }


    location ^~ /upload/ {
        location ~ \.php$ {
            deny all;
        }
    }

    location ^~ /healthz {
        access_log off;
        add_header 'Content-Type' 'text/plain';
        allow 127.0.0.1;
        deny all;
        return 200 "healthy\n";
    }
    
    location ~* /(cache|application/config)/.*\.php$ {
        deny all;
    }

    location ^~ /index.php/admin {
        allow 142.0.0.0/8;
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /var/www/html/limesurvey;
        expires 30d;
#        access_log off;
        gzip_static on;
    }
}